<!DOCTYPE html>
<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>Glowing Inputs Login Form UI</title>
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
   </head>
   <body>
      <div class="login-form">
         <div class="text">
            LOGIN
         </div>
         <form>
            <div class="field">
               <div class="fas fa-envelope"></div>
               <input type="text" id="username" placeholder="Email or Phone" required>
            </div>
            <div class="field">
               <div class="fas fa-lock"></div>
               <input type="password" placeholder="Password" required>
            </div>
            <button type="button" onclick="jalankanLogin()">LOGIN</button>
            <div class="link">
               Not a member?
               <a href="#">Signup now</a>
            </div>
         </form>
      </div>

      <script>
         function jalankanLogin() {
             const usernameInput = document.getElementById("username").value;

             // Validasi jika input kosong
             if (usernameInput.trim() === "") {
                 alert("Username tidak boleh kosong!");
                 return;
             }

             // Simpan nama ke localStorage
             localStorage.setItem("username", usernameInput);

             // Kembali ke halaman utama (Zay Shop) yang berada satu tingkat di luar folder ini
             window.location.href = "../index.html"; 
         }
      </script>
   </body>
</html>
