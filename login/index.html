<!DOCTYPE html>
<!-- Created By CodingNepal -->
<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>Glowing Inputs Login Form UI</title>
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
   </head>
   <body>
      <div class="login-form">
         <div class="text">
            LOGIN
         </div>
         <form>
            <div class="field">
               <div class="fas fa-envelope"></div>
               <!-- PENYESUAIAN 1: Tambahkan id="username" di sini -->
               <input type="text" id="username" placeholder="Email or Phone" required>
            </div>
            <div class="field">
               <div class="fas fa-lock"></div>
               <input type="password" placeholder="Password" required>
            </div>
            <!-- PENYESUAIAN 2: Ubah button jadi type="button" dan tambahkan onclick="login()" -->
            <button type="button" onclick="login()">LOGIN</button>
            <div class="link">
               Not a member?
               <a href="#">Signup now</a>
            </div>
         </form>
      </div>

      <!-- PENYESUAIAN 3: Panggil file welcome.js tepat sebelum tag penutup body -->
      <script src="js/welcome.js"></script>
   </body>
</html>
