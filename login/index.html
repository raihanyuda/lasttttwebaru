<!DOCTYPE html>
<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>Glowing Inputs Login Form UI</title>
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
   </head>
   <body>
      <div class="login-form">
         <div class="text">
            LOGIN
         </div>
         <form>
            <div class="field">
               <div class="fas fa-envelope"></div>
               <input type="text" id="username" placeholder="Email or Phone" required>
            </div>
            <div class="field">
               <div class="fas fa-lock"></div>
               <input type="password" placeholder="Password" required>
            </div>
            <button type="button" onclick="jalankanLogin()">LOGIN</button>
            <div class="link">
               Not a member?
               <a href="signup.html">Signup now</a>
            </div>
         </form>
      </div>

      <script>
         function jalankanLogin() {
             const usernameInput = document.getElementById("username").value.trim();

             if (usernameInput === "") {
           alert("Username tidak boleh kosong!");
           return;
              }

              // Ambil data daftar user dari database localstorage
             let daftarUser = JSON.parse(localStorage.getItem("daftarUser")) || [];

             // Cek apakah username yang mau login ini sudah terdaftar atau belum
              if (daftarUser.length > 0 && !daftarUser.includes(usernameInput)) {
                 alert("Username belum terdaftar! Silakan signup terlebih dahulu.");
              return;
             }

             // Jika aman atau database kosong, set sebagai user aktif saat ini
             localStorage.setItem("username", usernameInput);

             // Kembali ke halaman utama (Zay Shop)
              window.location.href = "../index.html"; 
         }
      </script>
   </body>
</html>
