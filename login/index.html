<!DOCTYPE html>
<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>Glowing Inputs Login Form UI</title>
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
   </head>
   <body>
      <div class="login-form">
         <div class="text">
            LOGIN
         </div>
         <form>
            <div id="message"></div>

            <div class="field">
               <div class="fas fa-envelope"></div>
               <input type="text" id="username" placeholder="Masukkan Username" required>
            </div>
            <div class="field">
               <div class="fas fa-lock"></div>
               <input type="password" placeholder="Password" required>
            </div>
            <button type="button" onclick="jalankanLogin()">LOGIN</button>
            <div class="link">
               Not a member?
               <a href="signup.html">Signup now</a>
            </div>
         </form>
      </div>

      <script>
         function jalankanLogin() {
             const usernameInput = document.getElementById("username").value.trim();
             const messageBox = document.getElementById("message");

             // Reset pesan lama jika ada
             messageBox.className = "";
             messageBox.innerText = "";

             if (usernameInput === "") {
                 messageBox.className = "alert";
                 messageBox.innerText = "Username tidak boleh kosong!";
                 return;
             }

             let daftarUser = JSON.parse(localStorage.getItem("daftarUser")) || [];

             // Validasi apakah username sudah terdaftar atau belum
             if (!daftarUser.includes(usernameInput)) {
                 messageBox.className = "alert";
                 messageBox.innerText = "Username belum terdaftar! Silakan signup dahulu.";
                 return;
             }

             // Simpan user aktif ke localStorage
             localStorage.setItem("username", usernameInput);

             // Diarahkan ke halaman utama
             window.location.href = "../index.html"; 
         }
      </script>
   </body>
</html>
