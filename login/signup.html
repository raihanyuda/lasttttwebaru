<!DOCTYPE html>
<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>Zay Shop - Signup Form</title>
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
   </head>
   <body>
      <div class="login-form">
         <div class="text">
            SIGNUP
         </div>
         <form>
            <div id="message"></div>

            <div class="field">
               <div class="fas fa-user"></div>
               <input type="text" id="regUsername" placeholder="Buat Username Baru" required>
            </div>
            <div class="field">
               <div class="fas fa-lock"></div>
               <input type="password" placeholder="Buat Password" required>
            </div>
            <button type="button" onclick="jalankanDaftar()">DAFTAR</button>
            <div class="link">
               Sudah punya akun?
               <a href="index.html">Login di sini</a>
            </div>
         </form>
      </div>

      <script>
         function jalankanDaftar() {
             const usernameBaru = document.getElementById("regUsername").value.trim();
             const messageBox = document.getElementById("message");

             // Reset pesan lama jika ada
             messageBox.className = "";
             messageBox.innerText = "";

             if (usernameBaru === "") {
                 messageBox.className = "alert";
                 messageBox.innerText = "Username tidak boleh kosong!";
                 return;
             }

             // Ambil database daftar user di localStorage
             let daftarUser = JSON.parse(localStorage.getItem("daftarUser")) || [];

             // VALIDASI USERNAME GANDA (Poin Utama LKPD Nomor 10)
             if (daftarUser.includes(usernameBaru)) {
                 messageBox.className = "alert";
                 messageBox.innerText = "Peringatan: Username sudah digunakan! Coba nama lain.";
                 return; 
             }

             // Jika berhasil, simpan ke database browser
             daftarUser.push(usernameBaru);
             localStorage.setItem("daftarUser", JSON.stringify(daftarUser));

             alert("Registrasi berhasil! Menuju form login...");
             window.location.href = "index.html";
         }
      </script>
   </body>
</html>
